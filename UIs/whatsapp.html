<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Feed – WhatsApp Group</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111b21;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #111b21;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 10px #1a1a1a, 0 0 0 12px #333, 0 32px 80px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }

    /* status bar */
    .status-bar {
      background: #1f2c34;
      padding: 12px 24px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #fff; }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    /* chat header */
    .chat-header {
      background: #1f2c34;
      padding: 8px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid #2a3942;
    }
    .back-btn svg {
      width: 22px; height: 22px;
      fill: none; stroke: #00a884;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .group-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #2a3942;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      padding: 2px;
    }
    .group-avatar-piece {
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: #fff;
    }

    .contact-info { flex: 1; cursor: pointer; min-width: 0; }
    .contact-name { font-size: 16px; font-weight: 600; color: #e9edef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-status { font-size: 12px; color: #8696a0; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .header-actions { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
    .header-actions svg {
      width: 22px; height: 22px;
      fill: none; stroke: #8696a0;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
      cursor: pointer;
    }
    .header-actions svg:hover { stroke: #e9edef; }

    /* chat background */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 6px;
      background: #0b141a;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: #2a3942 transparent;
    }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 4px; }

    /* date badge */
    .date-badge { text-align: center; margin: 8px 0 12px; }
    .date-badge span {
      background: #182229;
      color: #8696a0;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 8px;
    }

    /* group info banner */
    .group-banner {
      background: #182229;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      text-align: center;
    }
    .group-banner p { font-size: 12px; color: #8696a0; line-height: 1.6; }
    .group-banner p span { color: #00a884; }

    /* bubble row */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 2px;
    }
    .bubble-row.sent { justify-content: flex-end; }
    .bubble-row.recv { justify-content: flex-start; }

    .bubble-row.new-sender { margin-top: 8px; }

    /* small avatar next to recv bubble */
    .bubble-sender-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 2px;
    }
    .bubble-sender-avatar.hidden { visibility: hidden; }

    .bubble {
      max-width: 75%;
      padding: 6px 10px 5px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
    }

    .bubble.sent {
      background: #005c4b;
      color: #e9edef;
      border-top-right-radius: 2px;
    }
    .bubble.recv {
      background: #1f2c34;
      color: #e9edef;
      border-top-left-radius: 2px;
    }

    /* tails */
    .bubble-row:not(.no-tail) .bubble.sent::after {
      content: '';
      position: absolute;
      top: 0; right: -8px;
      border-top: 8px solid #005c4b;
      border-right: 8px solid transparent;
    }
    .bubble-row:not(.no-tail) .bubble.recv::after {
      content: '';
      position: absolute;
      top: 0; left: -8px;
      border-top: 8px solid #1f2c34;
      border-left: 8px solid transparent;
    }

    .sender-name {
      font-size: 12.5px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .bubble-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      margin-top: 3px;
    }
    .bubble-time { font-size: 11px; color: #8696a0; white-space: nowrap; }
    .tick svg { width: 16px; height: 10px; }

    /* typing */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 4px;
    }
    .typing-bubble {
      background: #1f2c34;
      border-radius: 8px;
      border-top-left-radius: 2px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 4px;
    }
    .typing-name {
      font-size: 11px;
      color: #8696a0;
      margin-bottom: 4px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #8696a0;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* input bar */
    .chat-input-bar {
      background: #1f2c34;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1;
      background: #2a3942;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      min-height: 44px;
    }
    .input-icon svg {
      width: 22px; height: 22px;
      fill: none; stroke: #8696a0;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }
    .input-wrap input {
      flex: 1;
      background: transparent; border: none; outline: none;
      font-size: 15px; color: #e9edef;
    }
    .input-wrap input::placeholder { color: #8696a0; }
    .mic-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #00a884;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mic-btn svg {
      width: 22px; height: 22px;
      fill: none; stroke: #fff;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }

    .home-bar {
      background: #111b21;
      display: flex; justify-content: center;
      padding: 6px 0 10px;
      flex-shrink: 0;
    }
    .home-bar div {
      width: 120px; height: 5px;
      background: #fff; border-radius: 3px; opacity: 0.3;
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><rect x="1" y="16" width="3" height="7" rx="1"/><rect x="6" y="11" width="3" height="12" rx="1"/><rect x="11" y="6" width="3" height="17" rx="1"/><rect x="16" y="1" width="3" height="22" rx="1" opacity=".3"/></svg>
      <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="#fff"/></svg>
      <svg viewBox="0 0 24 24"><rect x="1" y="6" width="18" height="12" rx="2" stroke="#fff" stroke-width="1.5" fill="none"/><rect x="3" y="8" width="13" height="8" rx="1" fill="#fff"/><path d="M20 10v4" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- Chat header -->
  <div class="chat-header">
    <div class="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>

    <div class="group-avatar" id="group-avatar"></div>

    <div class="contact-info">
      <div class="contact-name">AI Thinkers 🧠</div>
      <div class="contact-status" id="members-status">10 members</div>
    </div>
    <div class="header-actions">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.5 16z"/></svg>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>
  </div>

  <!-- Chat body -->
  <div class="chat-body" id="chat-body">
    <div class="date-badge"><span id="date-label">TODAY</span></div>
    <div class="group-banner">
      <p>You created group <span>"AI Thinkers 🧠"</span></p>
      <p>You added <span id="group-members-added">10 members</span></p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="chat-input-bar">
    <div class="input-wrap">
      <div class="input-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </div>
      <input type="text" placeholder="Message" readonly>
      <div class="input-icon">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </div>
    </div>
    <button class="mic-btn">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
  </div>

  <div class="home-bar"><div></div></div>
</div>

<script src="personalities-ui.js"></script>
<script>
  const POSTS_PER_BATCH = 20;
  let allPosts = [];
  let currentIndex = 0;
  let loading = false;
  let allLoaded = false;

  const chatBody = document.getElementById("chat-body");

  function setupGroupHeader() {
    const list = LocialPersonalities.list;
    document.getElementById("members-status").textContent =
      `${list.length} members`;
    document.getElementById("group-members-added").textContent =
      list.map((p) => p.name).join(", ");

    const groupAvatarEl = document.getElementById("group-avatar");
    groupAvatarEl.innerHTML = "";
    list.slice(0, 4).forEach((p) => {
      const piece = document.createElement("div");
      piece.className = "group-avatar-piece";
      piece.style.background = p.color;
      piece.textContent = p.short[0];
      groupAvatarEl.appendChild(piece);
    });
  }

  // live clock
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
  }
  updateClock();
  setInterval(updateClock, 30000);

  // date label
  const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  document.getElementById("date-label").textContent = days[new Date().getDay()];

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
  }

  function blueTick() {
    return `<span class="tick"><svg viewBox="0 0 18 10" fill="none">
      <path d="M1 5l4 4L13 1" stroke="#53bdeb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 5l4 4 6-8" stroke="#53bdeb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg></span>`;
  }

  let lastPersonalityId = null;

  function appendMessage(post) {
    const pid    = post.personality.id;
    const member = LocialPersonalities.resolve(post);
    const isSent = false; // all group messages are "received" — we're the observer
    const sameAsPrev = pid === lastPersonalityId;

    const row = document.createElement("div");
    row.className = "bubble-row recv" + (sameAsPrev ? " no-tail" : " new-sender");

    // small avatar — show only on last bubble of a group
    const avatarEl = document.createElement("div");
    avatarEl.className = "bubble-sender-avatar";
    avatarEl.style.background = member.color;
    avatarEl.textContent = member.short;

    const bubble = document.createElement("div");
    bubble.className = "bubble recv";

    bubble.innerHTML = `
      ${!sameAsPrev ? `<div class="sender-name" style="color:${member.color}">${member.name}</div>` : ""}
      <div>${post.rewritten.text}</div>
      <div class="bubble-meta">
        <span class="bubble-time">${formatTime(post.created_at)}</span>
      </div>`;

    row.appendChild(avatarEl);
    row.appendChild(bubble);

    // hide previous last avatar when a new message from same person arrives
    if (sameAsPrev) {
      avatarEl.classList.add("hidden");
      // unhide logic: the current last avatar is always visible
    }

    chatBody.appendChild(row);
    lastPersonalityId = pid;
  }

  function loadMorePosts() {
    if (loading || allLoaded) return;
    if (currentIndex >= allPosts.length) {
      allLoaded = true;
      return;
    }

    loading = true;

    const next = allPosts.slice(currentIndex, currentIndex + POSTS_PER_BATCH);
    if (next.length === 0) {
      allLoaded = true;
      loading = false;
      return;
    }

    next.forEach(post => appendMessage(post));
    currentIndex += next.length;

    if (currentIndex >= allPosts.length) {
      allLoaded = true;
      const end = document.createElement("div");
      end.className = "date-badge";
      end.innerHTML = "<span>No more messages</span>";
      chatBody.appendChild(end);
    }

    loading = false;
  }

  async function loadJson() {
    const response = await fetch("../data/generatedData/posts.json");
    allPosts = await response.json();
    allPosts = allPosts.data;
    loadMorePosts();
  }

  chatBody.addEventListener("scroll", () => {
    if (allLoaded) return;
    if (chatBody.scrollTop + chatBody.clientHeight >= chatBody.scrollHeight - 300) {
      loadMorePosts();
    }
  });

  async function init() {
    await LocialPersonalities.load();
    setupGroupHeader();
    await loadJson();
  }

  init();
</script>

</body>
</html>
